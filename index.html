<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Find Your Seat</title>
<style>
  :root {
    --bg: #fbf0c4;          /* butter yellow */
    --card: #fffdf5;
    --ink: #3c4a57;         /* deep dusty blue ink */
    --muted: #7d93a6;
    --accent: #8da9c4;      /* dusty blue */
    --accent-dark: #6e8ca0;
    --line: #e6dcb4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }
  header { text-align: center; margin-bottom: 32px; }
  .eyebrow {
    text-transform: uppercase; letter-spacing: 3px; font-size: 12px;
    color: var(--accent); margin: 0 0 8px;
  }
  h1 { font-size: 34px; font-weight: 600; margin: 0 0 6px; }
  .sub { color: var(--muted); margin: 0; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 24px; box-shadow: 0 6px 24px rgba(60,44,20,0.06);
  }
  label { display: block; font-weight: 600; margin-bottom: 8px; }
  .search-row { position: relative; }
  input[type="search"] {
    width: 100%; padding: 14px 16px; font-size: 17px;
    border: 1px solid var(--line); border-radius: 10px; outline: none;
    background: #fffdfa;
  }
  input[type="search"]:focus { border-color: var(--accent); }
  #results { margin-top: 18px; }
  .result {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 14px 16px; border: 1px solid var(--line);
    border-radius: 10px; margin-bottom: 10px; background: #fffdfa;
  }
  .result .who { font-weight: 600; }
  .badge {
    flex: none; background: var(--accent); color: #fff; font-weight: 700;
    border-radius: 999px; padding: 8px 16px; font-size: 15px; white-space: nowrap;
  }
  .hint, .empty { color: var(--muted); padding: 6px 2px; }
  .empty strong { color: var(--ink); }
  section.floor { margin-top: 40px; }
  section.floor h2 { font-size: 20px; font-weight: 600; margin: 0 0 14px; }
  .floorplan {
    width: 100%; border-radius: 14px; border: 1px solid var(--line);
    display: block; background: #fff;
  }
  .placeholder {
    width: 100%; aspect-ratio: 4 / 3; border-radius: 14px;
    border: 2px dashed var(--line); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    color: var(--muted); background:
      repeating-linear-gradient(45deg, #fdf6d6, #fdf6d6 14px, #f6ecbe 14px, #f6ecbe 28px);
    text-align: center; padding: 20px;
  }
  .placeholder .big { font-size: 18px; font-weight: 600; color: var(--ink); }
  footer { text-align: center; color: var(--muted); font-size: 13px; margin-top: 40px; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">Wedding Reception</p>
      <h1>Find Your Seat</h1>
      <p class="sub">Start typing your name to find your table.</p>
    </header>

    <div class="card">
      <label for="q">Your name</label>
      <div class="search-row">
        <input id="q" type="search" placeholder="e.g. Terry Chiang" autocomplete="off" autofocus>
      </div>
      <div id="results"><p class="hint">157 guests seated &mdash; type to search.</p></div>
    </div>

    <section class="floor">
      <h2>Venue Floorplan</h2>
      <img id="floorplan" class="floorplan" alt="Venue floorplan" style="display:none">
      <div id="placeholder" class="placeholder">
        <span class="big">Floorplan coming soon</span>
        <span>Replace this by adding <code>floorplan.jpg</code> or <code>floorplan.png</code> next to this page.</span>
      </div>
    </section>

    <footer>With love &mdash; please find your table and enjoy the evening.</footer>
  </div>

: "Anna Wong (1YO)"}, {"table": "12", "name": "Derek Liang"}, {"table": "15", "name": "Richard Wu"}, {"table": "15", "name": "Chloe Ding"}];

  const q = document.getElementById("q");
  const results = document.getElementById("results");
  const total = GUESTS.length;

  function norm(s) { return s.toLowerCase().replace(/\s+/g, " ").trim(); }

  function render(query) {
    const term = norm(query);
    if (!term) {
      results.innerHTML =
        '<p class="hint">' + total + ' guests seated &mdash; type to search.</p>';
      return;
    }
    const matches = GUESTS
      .filter(g => norm(g.name).includes(term))
      .sort((a, b) => a.name.localeCompare(b.name))
      .slice(0, 20);

    if (matches.length === 0) {
      results.innerHTML =
        '<p class="empty">No match for <strong>' + escapeHtml(query) +
        '</strong>. Try your first or last name, or ask the host.</p>';
      return;
    }
    results.innerHTML = matches.map(g =>
      '<div class="result"><span class="who">' + escapeHtml(g.name) +
      '</span><span class="badge">Table ' + escapeHtml(g.table) + '</span></div>'
    ).join("");
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
    ));
  }

  q.addEventListener("input", () => render(q.value));

  // Use a real floorplan image if one is present; otherwise keep placeholder.
  (function () {
    const img = document.getElementById("floorplan");
    const ph = document.getElementById("placeholder");
    const candidates = ["floorplan.jpg", "floorplan.jpeg", "floorplan.png", "floorplan.webp"];
    let i = 0;
    function tryNext() {
      if (i >= candidates.length) return;
      const test = new Image();
      test.onload = () => { img.src = candidates[i]; img.style.display = "block"; ph.style.display = "none"; };
      test.onerror = () => { i++; tryNext(); };
      test.src = candidates[i] + "?v=" + Date.now();
    }
    tryNext();
  })();
</script>
</body>
</html>
